site_name: Waves
repo_url: https://github.com/iamprivacy/Waves
site_url: https://iamprivacy.github.io/Waves
site_description: "Waves: a native desktop UI for the Tidaler download engine."
site_author: iamprivacy
edit_uri: edit/master/docs/
repo_name: iamprivacy/Waves
copyright: Maintained by <a href="https://github.com/iamprivacy">iamprivacy</a>.

nav:
  - Home: index.md
  - Modules: modules.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          setup_commands:
            - import sys
            - sys.path.append('../')
theme:
  name: material
  feature:
    tabs: true
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/iamprivacy/Waves

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
